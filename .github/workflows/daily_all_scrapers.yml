name: Daily All Scrapers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  scrape-chaldal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Run Chaldal scraper
        run: python scrape_chaldal.py --urls-file urls_chaldal.txt --headless true
      - name: Upload Chaldal outputs
        uses: actions/upload-artifact@v4
        with:
          name: chaldal-outputs
          path: outputs/chaldal_products_*.csv
          if-no-files-found: error

  scrape-shwapno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium
      - name: Run Shwapno scraper
        run: python scrape_shwapno.py --urls-file urls_shwapno.txt --headless true
      - name: Upload Shwapno outputs
        uses: actions/upload-artifact@v4
        with:
          name: shwapno-outputs
          path: outputs/shwapno_products_*.csv
          if-no-files-found: error

  scrape-meena:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Meena scraper
        run: python scrape_meena.py --urls-file urls_meena.txt --headless true
      - name: Upload Meena outputs
        uses: actions/upload-artifact@v4
        with:
          name: meena-outputs
          path: outputs/meena_products_*.csv
          if-no-files-found: error
